<!DOCTYPE html>
<head>
<meta charset="utf-8">
<title>SVG Song Frames</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/MorphSVGPlugin.min.js"></script>


</head>



<body>


<div id="svgcontainer">
  <div id="svgholder-top">
  </div>
  <div id="svgholder-bottom">
  </div>
</div>
  <div class="player is-hidden">
      <audio controls controlslist="nofullscreen nodownload noplaybackrate" id="myAudio" src="../music/orion-sun-05-2-new.mp3"></audio>
  </div>


<section class="hero is-fullheight" id="contentwrapper">
  <div class="hero-body">
    <h1 id='abovetext' class="title">Press Play</h1>
    <div class="container has-text-centered" id="remote-player">

      <button class='button is-rounded' id="playpause-btn">&#x23F5;</button>
      <div class="song-slider">
        <input type="range" id="seekbar" value="0" step="1" style="width: auto;">
      </div>
    </div>
    <h1 id='belowtext' class="title">To Start</h1>
  </div>
</section>

<script src="script.js"  charset="UTF-8"></script>
</body>
